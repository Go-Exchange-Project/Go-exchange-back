services:
  postgres-test:
    image: postgres:16-alpine
    container_name: goexchange-postgres-test
    environment:
      POSTGRES_DB: goexchange_test
      POSTGRES_USER: goexchange_test
      POSTGRES_PASSWORD: goexchange_test_password
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goexchange_test -d goexchange_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - goexchange_test_postgres_data:/var/lib/postgresql/data

volumes:
  goexchange_test_postgres_data:
