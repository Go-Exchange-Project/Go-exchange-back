name: Backend CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

defaults:
  run:
    working-directory: .

jobs:
  unit-static:
    name: Unit tests and vet
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download Go modules
        run: go mod download

      - name: Run Go tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Stress matching package
        run: go test -count=20 ./internal/matching

  postgres-integration:
    name: Postgres integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: goexchange_test
          POSTGRES_PASSWORD: goexchange_test_password
          POSTGRES_DB: goexchange_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U goexchange_test -d goexchange_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 5s

    env:
      GOEXCHANGE_TEST_DATABASE_DSN: host=localhost user=goexchange_test password=goexchange_test_password dbname=goexchange_test port=5432 sslmode=disable

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download Go modules
        run: go mod download

      - name: Run Postgres integration tests
        run: go test -run Integration -v ./internal/repository ./internal/service

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: goexchange-back:test

  docker-publish:
    name: Docker publish to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - unit-static
      - postgres-integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/go-exchange-project/go-exchange-back
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
