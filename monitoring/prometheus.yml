global:
  scrape_interval: 5s

scrape_configs:
  - job_name: goexchange-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8080"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["10.10.0.4:9187"]
